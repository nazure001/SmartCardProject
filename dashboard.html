<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Smart Card - Sekolah</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        header h1 {
            color: #667eea;
            margin-bottom: 5px;
        }

        header p {
            color: #666;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 20px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ==================== SCAN KARTU ==================== */
        .scan-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: 0 auto;
        }

        .scan-input-group {
            margin-bottom: 20px;
        }

        .scan-input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .scan-input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .scan-input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .scan-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .scan-btn:hover {
            background: #764ba2;
        }

        .scan-result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }

        .scan-result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .scan-result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .scan-result.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .profile-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
        }

        .profile-card p {
            margin: 8px 0;
            font-size: 14px;
        }

        .profile-card strong {
            color: #667eea;
        }

        /* ==================== TABLE ==================== */
        .table-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        table thead {
            background: #667eea;
            color: white;
        }

        table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        table tbody tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-hadir {
            background: #d4edda;
            color: #155724;
        }

        .status-terlambat {
            background: #fff3cd;
            color: #856404;
        }

        .status-izin {
            background: #cce5ff;
            color: #004085;
        }

        .status-sakit {
            background: #d1ecf1;
            color: #0c5460;
        }

        /* ==================== FILTER & SEARCH ==================== */
        .filter-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-group input,
        .filter-group select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .filter-group button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        .filter-group button:hover {
            background: #764ba2;
        }

        /* ==================== STATS ==================== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #667eea;
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-card.hadir { border-left-color: #28a745; }
        .stat-card.hadir .number { color: #28a745; }

        .stat-card.terlambat { border-left-color: #ffc107; }
        .stat-card.terlambat .number { color: #ffc107; }

        .stat-card.izin { border-left-color: #17a2b8; }
        .stat-card.izin .number { color: #17a2b8; }

        .stat-card.sakit { border-left-color: #dc3545; }
        .stat-card.sakit .number { color: #dc3545; }

        /* ==================== LOADING & ERROR ==================== */
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {
            .tabs {
                flex-wrap: wrap;
            }

            .tab-btn {
                flex: 1;
                min-width: 100px;
            }

            .scan-container {
                padding: 20px;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            table {
                font-size: 12px;
            }

            table th, table td {
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .filter-group {
                flex-direction: column;
            }

            .filter-group input,
            .filter-group select,
            .filter-group button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <h1>🎓 Dashboard Smart Card Sekolah</h1>
            <p id="current-time"></p>
        </header>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('scan')">📱 Scan Kartu</button>
            <button class="tab-btn" onclick="showTab('presensi')">📋 Presensi Harian</button>
            <button class="tab-btn" onclick="showTab('stats')">📊 Statistik</button>
            <button class="tab-btn" onclick="showTab('profil')">👤 Profil Siswa</button>
        </div>

        <!-- TAB 1: SCAN KARTU -->
        <div id="scan" class="tab-content active">
            <div class="scan-container">
                <h2 style="margin-bottom: 20px; color: #667eea;">📱 Scan Kartu Siswa</h2>
                
                <div class="scan-input-group">
                    <label for="nisn-input">NISN Siswa:</label>
                    <input 
                        type="text" 
                        id="nisn-input" 
                        placeholder="Masukkan NISN atau scan kartu..." 
                        onkeypress="handleScanKeypress(event)"
                    >
                </div>

                <button class="scan-btn" onclick="scanCard()">🔍 Scan Kartu</button>

                <div id="scan-result" class="scan-result"></div>
            </div>
        </div>

        <!-- TAB 2: PRESENSI HARIAN -->
        <div id="presensi" class="tab-content">
            <div class="filter-group">
                <input type="date" id="filter-date" value="">
                <input type="text" id="filter-nisn" placeholder="Filter NISN...">
                <button onclick="loadPresensi()">🔍 Filter</button>
            </div>

            <div class="table-container">
                <div id="presensi-loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Loading...</p>
                </div>
                <table id="presensi-table" style="display: none;">
                    <thead>
                        <tr>
                            <th>NISN</th>
                            <th>Nama Siswa</th>
                            <th>Kelas</th>
                            <th>Waktu Scan</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="presensi-body"></tbody>
                </table>
            </div>
        </div>

        <!-- TAB 3: STATISTIK -->
        <div id="stats" class="tab-content">
            <div class="filter-group">
                <select id="filter-month">
                    <option value="1">Januari</option>
                    <option value="2">Februari</option>
                    <option value="3" selected>Maret</option>
                    <option value="4">April</option>
                    <option value="5">Mei</option>
                    <option value="6">Juni</option>
                    <option value="7">Juli</option>
                    <option value="8">Agustus</option>
                    <option value="9">September</option>
                    <option value="10">Oktober</option>
                    <option value="11">November</option>
                    <option value="12">Desember</option>
                </select>
                <select id="filter-year">
                    <option value="2024">2024</option>
                    <option value="2025" selected>2025</option>
                    <option value="2026">2026</option>
                </select>
                <button onclick="loadStats()">📊 Tampilkan</button>
            </div>

            <div id="stats-cards" class="stats-grid"></div>

            <div class="table-container">
                <div id="stats-loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Loading...</p>
                </div>
                <table id="stats-table" style="display: none;">
                    <thead>
                        <tr>
                            <th>NISN</th>
                            <th>Nama Siswa</th>
                            <th>Kelas</th>
                            <th>Hadir</th>
                            <th>Terlambat</th>
                            <th>Izin</th>
                            <th>Sakit</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="stats-body"></tbody>
                </table>
            </div>
        </div>

        <!-- TAB 4: PROFIL SISWA -->
        <div id="profil" class="tab-content">
            <div class="scan-container" style="max-width: 600px;">
                <h2 style="margin-bottom: 20px; color: #667eea;">👤 Cari Profil Siswa</h2>
                
                <div class="scan-input-group">
                    <label for="profil-nisn">NISN Siswa:</label>
                    <input 
                        type="text" 
                        id="profil-nisn" 
                        placeholder="Masukkan NISN..."
                    >
                </div>

                <button class="scan-btn" onclick="loadProfil()">🔍 Cari Profil</button>

                <div id="profil-result"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';

        // ==================== HELPER FUNCTIONS ====================
        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function updateTime() {
            const now = new Date().toLocaleString('id-ID');
            document.getElementById('current-time').textContent = `⏰ ${now}`;
        }

        function formatTimeString(dateString) {
            const date = new Date(dateString);
            return date.toLocaleTimeString('id-ID');
        }

        function getStatusBadge(status) {
            const badges = {
                'Hadir': '<span class="status-badge status-hadir">✓ Hadir</span>',
                'Terlambat': '<span class="status-badge status-terlambat">⏰ Terlambat</span>',
                'Izin': '<span class="status-badge status-izin">📄 Izin</span>',
                'Sakit': '<span class="status-badge status-sakit">🤒 Sakit</span>'
            };
            return badges[status] || status;
        }

        // ==================== SCAN KARTU ====================
        function handleScanKeypress(event) {
            if (event.key === 'Enter') {
                scanCard();
            }
        }

        async function scanCard() {
            const nisn = document.getElementById('nisn-input').value.trim();
            if (!nisn) {
                showScanResult('❌ NISN tidak boleh kosong', 'error');
                return;
            }

            showScanResult('⏳ Memproses scan...', 'loading');

            try {
                const response = await fetch(`${API_URL}/api/scan-gerbang`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nisn })
                });

                const data = await response.json();

                if (!data.success) {
                    showScanResult(data.message, 'error');
                    return;
                }

                let profileHTML = `
                    <div class="profile-card">
                        <h3 style="color: #667eea; margin-bottom: 15px;">✅ ${data.message}</h3>
                        <p><strong>NISN:</strong> ${data.data.nisn}</p>
                        <p><strong>Nama:</strong> ${data.data.nama}</p>
                        <p><strong>Kelas:</strong> ${data.data.kelas}</p>
                        <p><strong>Waktu Scan:</strong> ${data.data.waktu_scan}</p>
                        <p><strong>Status:</strong> ${data.data.terlambat ? '⏰ TERLAMBAT' : '✓ TEPAT WAKTU'}</p>
                    </div>
                `;

                showScanResult(profileHTML, 'success');
                document.getElementById('nisn-input').value = '';

            } catch (error) {
                showScanResult('❌ Error: ' + error.message, 'error');
            }
        }

        function showScanResult(html, type) {
            const result = document.getElementById('scan-result');
            result.innerHTML = html;
            result.className = `scan-result ${type}`;
        }

        // ==================== PRESENSI ====================
        async function loadPresensi() {
            document.getElementById('presensi-loading').style.display = 'block';
            document.getElementById('presensi-table').style.display = 'none';

            try {
                const tanggal = document.getElementById('filter-date').value;
                const nisn = document.getElementById('filter-nisn').value;

                let url = `${API_URL}/api/presensi`;
                const params = new URLSearchParams();
                if (tanggal) params.append('tanggal', tanggal);
                if (nisn) params.append('nisn', nisn);
                if (params.toString()) url += '?' + params.toString();

                const response = await fetch(url);
                const data = await response.json();

                if (!data.success || !data.data.length) {
                    document.getElementById('presensi-loading').innerHTML = '<p>Tidak ada data presensi</p>';
                    return;
                }

                const tbody = document.getElementById('presensi-body');
                tbody.innerHTML = '';

                data.data.forEach(row => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${row.nisn}</td>
                            <td>${row.nama_lengkap}</td>
                            <td>${row.kelas}</td>
                            <td>${formatTimeString(row.waktu_scan)}</td>
                            <td>${getStatusBadge(row.status_kehadiran)}</td>
                        </tr>
                    `;
                });

                document.getElementById('presensi-loading').style.display = 'none';
                document.getElementById('presensi-table').style.display = 'table';

            } catch (error) {
                document.getElementById('presensi-loading').innerHTML = '<p class="error-message">Error: ' + error.message + '</p>';
            }
        }

        // ==================== STATISTIK ====================
        async function loadStats() {
            document.getElementById('stats-loading').style.display = 'block';
            document.getElementById('stats-table').style.display = 'none';

            try {
                const bulan = document.getElementById('filter-month').value;
                const tahun = document.getElementById('filter-year').value;

                const response = await fetch(`${API_URL}/api/stats/presensi?bulan=${bulan}&tahun=${tahun}`);
                const data = await response.json();

                if (!data.success || !data.data.length) {
                    document.getElementById('stats-loading').innerHTML = '<p>Tidak ada data statistik</p>';
                    return;
                }

                // Calculate totals
                let totalHadir = 0, totalTerlambat = 0, totalIzin = 0, totalSakit = 0;
                data.data.forEach(row => {
                    totalHadir += row.hadir || 0;
                    totalTerlambat += row.terlambat || 0;
                    totalIzin += row.izin || 0;
                    totalSakit += row.sakit || 0;
                });

                // Display stat cards
                document.getElementById('stats-cards').innerHTML = `
                    <div class="stat-card hadir">
                        <h3>Total Hadir</h3>
                        <div class="number">${totalHadir}</div>
                    </div>
                    <div class="stat-card terlambat">
                        <h3>Total Terlambat</h3>
                        <div class="number">${totalTerlambat}</div>
                    </div>
                    <div class="stat-card izin">
                        <h3>Total Izin</h3>
                        <div class="number">${totalIzin}</div>
                    </div>
                    <div class="stat-card sakit">
                        <h3>Total Sakit</h3>
                        <div class="number">${totalSakit}</div>
                    </div>
                `;

                // Display table
                const tbody = document.getElementById('stats-body');
                tbody.innerHTML = '';

                data.data.forEach(row => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${row.nisn}</td>
                            <td>${row.nama_lengkap}</td>
                            <td>${row.kelas}</td>
                            <td>${row.hadir || 0}</td>
                            <td>${row.terlambat || 0}</td>
                            <td>${row.izin || 0}</td>
                            <td>${row.sakit || 0}</td>
                            <td><strong>${row.total || 0}</strong></td>
                        </tr>
                    `;
                });

                document.getElementById('stats-loading').style.display = 'none';
                document.getElementById('stats-table').style.display = 'table';

            } catch (error) {
                document.getElementById('stats-loading').innerHTML = '<p class="error-message">Error: ' + error.message + '</p>';
            }
        }

        // ==================== PROFIL SISWA ====================
        async function loadProfil() {
            const nisn = document.getElementById('profil-nisn').value.trim();
            if (!nisn) {
                alert('NISN tidak boleh kosong');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/profil/${nisn}`);
                const data = await response.json();

                const resultDiv = document.getElementById('profil-result');

                if (!data.success) {
                    resultDiv.innerHTML = `<div class="error-message">${data.message}</div>`;
                    return;
                }

                const siswa = data.data;
                const peminjamanHTML = siswa.pinjaman_aktif && siswa.pinjaman_aktif.length > 0
                    ? siswa.pinjaman_aktif.map(p => `<li>${p.judul_buku} (Tenggat: ${p.tgl_tenggat})</li>`).join('')
                    : '<li>Tidak ada buku yang dipinjam</li>';

                resultDiv.innerHTML = `
                    <div class="profile-card" style="margin-top: 30px; background: white; border: 2px solid #667eea;">
                        <h3 style="color: #667eea; margin-bottom: 15px;">📋 Data Profil Lengkap</h3>
                        <p><strong>NISN:</strong> ${siswa.nisn}</p>
                        <p><strong>Nama:</strong> ${siswa.nama_lengkap}</p>
                        <p><strong>Kelas:</strong> ${siswa.kelas}</p>
                        <p><strong>No. HP Orang Tua:</strong> ${siswa.no_hp_ortu || 'Tidak ada'}</p>
                        <p><strong>Total Poin Pelanggaran:</strong> <span style="color: #dc3545; font-weight: bold;">${siswa.total_poin}</span></p>
                        
                        ${siswa.presensi_hari_ini ? `
                            <p style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee;">
                                <strong>Presensi Hari Ini:</strong> ${getStatusBadge(siswa.presensi_hari_ini.status_kehadiran)}
                            </p>
                        ` : ''}
                        
                        <p style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee;">
                            <strong>📚 Buku Pinjaman Aktif:</strong>
                        </p>
                        <ul style="margin-left: 20px; margin-top: 10px;">
                            ${peminjamanHTML}
                        </ul>
                    </div>
                `;

            } catch (error) {
                document.getElementById('profil-result').innerHTML = `<div class="error-message">Error: ${error.message}</div>`;
            }
        }

        // ==================== INITIALIZATION ====================
        window.addEventListener('load', () => {
            updateTime();
            setInterval(updateTime, 1000);

            // Set today's date as default filter
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('filter-date').value = today;

            // Focus on NISN input on page load
            document.getElementById('nisn-input').focus();
        });
    </script>
</body>
</html>
